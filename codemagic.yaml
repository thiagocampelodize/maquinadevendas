workflows:
  ios-build:
    name: iOS Build
    environment:
      node: 18
      xcode: latest
      groups:
        - app_env

    scripts:
      - npm install
      - npx expo prebuild --platform ios --non-interactive
      - pod install --project-directory=ios
      - xcode-project build-ipa --workspace ios/project.xcworkspace --scheme project

    artifacts:
      - ios/build/**/*.ipa
      - /tmp/xcodebuild_logs/*.log
