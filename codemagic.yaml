workflows:
  ios-build:
    name: iOS Build
    environment:
      xcode: latest
      node: 18
      groups:
        - app_env

    scripts:
      - npm install

      # gera pasta ios
      - npx expo prebuild --platform ios --non-interactive

      # instalar pods
      - cd ios
      - pod install
      - cd ..

      # build do app
      - xcodebuild \
        -workspace ios/*.xcworkspace \
        -scheme $(ls ios | grep xcodeproj | sed 's/.xcodeproj//') \
        -configuration Release \
        -sdk iphonesimulator \
        -destination 'platform=iOS Simulator,name=iPhone 15'

    artifacts:
      - ios/build/**/*.ipa
