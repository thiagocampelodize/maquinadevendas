workflows:
  ios-build:
    name: iOS Build
    environment:
      node: 18
      xcode: latest
      groups:
        - app_env

    scripts:
      - npm install
      - npx expo prebuild --platform ios --non-interactive
      - pod install --project-directory=ios

      - xcodebuild -workspace ios/MquinadeVendas.xcworkspace
          -scheme MquinadeVendas
          -configuration Debug
          -sdk iphonesimulator
          -destination 'platform=iOS Simulator,name=iPad (10th generation)'
          -derivedDataPath ios/build

      - xcrun simctl boot "iPad (10th generation)" || true

      - xcrun simctl install booted ios/build/Build/Products/Debug-iphonesimulator/MquinadeVendas.app

      - xcrun simctl launch --console-pty booted com.maquinadevendas.maquinadevendas 2>&1 | tee /tmp/simulator_logs.txt &
      - sleep 60

    artifacts:
      - /tmp/simulator_logs.txt
      - /tmp/xcodebuild_logs/*.log