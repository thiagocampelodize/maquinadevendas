workflows:
  ios-build:
    name: iOS Build
    environment:
      node: 18
      xcode: latest
      groups:
        - app_env

    scripts:
      - npm install
      - npx expo prebuild --platform ios --non-interactive
      - pod install --project-directory=ios # ← tudo em um step só

    artifacts:
      - ios/build/**/*.ipa
